module:
  name: pulse_latch

ports:
  - {name: clk, dir: input, width: 1}
  - {name: rst_n, dir: input, width: 1}
  - {name: set_pulse, dir: input, width: 1}
  - {name: flag, dir: output, width: 1, kind: reg}

timing:
  clock: clk
  reset:
    signal: rst_n
    active: low
    mode: async

design:
  kind: generic
  behavior:
    processes:
      - kind: seq
        clock: clk
        reset:
          signal: rst_n
          active: low
          mode: async
        reset_body:
          - assign: {target: flag, expr: 0, blocking: false}
        body:
          - assign: {target: flag, expr: flag | set_pulse, blocking: false}

verification:
  tb:
    enabled: true
    level: functional
    seq_steps:
      - name: reset_assert
        drive: {rst_n: 0, set_pulse: 0}
        delay: 1
        expect: {flag: 0}
      - name: set_flag
        drive: {rst_n: 1, set_pulse: 1}
        edge: posedge clk
        expect: {flag: 1}
      - name: hold_flag
        drive: {set_pulse: 0}
        edge: posedge clk
        expect: {flag: 1}
