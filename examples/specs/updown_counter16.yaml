module:
  name: updown_counter16
  ports:
    - name: clk
      dir: input
    - name: reset
      dir: input
    - name: up
      dir: input
    - name: count
      dir: output
      width: 16
      kind: reg
behavior:
  operations:
    - if reset == 1: count = 0
    - else if up == 1: count = count + 1
    - else: count = count - 1
