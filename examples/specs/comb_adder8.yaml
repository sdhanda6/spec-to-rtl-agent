module:
  name: comb_adder8

ports:
  - {name: a, dir: input, width: 8}
  - {name: b, dir: input, width: 8}
  - {name: y, dir: output, width: 8, kind: reg}

design:
  kind: combinational
  behavior:
    operations:
      - {target: y, operator: add, operands: [a, b]}

verification:
  tb:
    enabled: true
    level: functional
    checks:
      - independent add vectors
